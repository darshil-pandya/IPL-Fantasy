# Deploy Firestore rules + Cloud Functions from GitHub (no local machine required).
# Add repository secrets first — see docs/firebase-score-sync.md
#
# Secret values go to Google Secret Manager via `gcloud` (service account key).
# `firebase functions:secrets:set` often fails in CI with "have you run firebase login?"
# even when GOOGLE_APPLICATION_CREDENTIALS is set — the Firebase CLI does not always use ADC
# for that subcommand. `firebase deploy` still uses the JSON key file for deployment.
name: Deploy Firebase backend

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_SA_KEY: ${{ github.workspace }}/gcp-sa.json
      PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Verify required GitHub Actions secrets
        env:
          CRICKET: ${{ secrets.CRICKETDATA_API_KEY }}
          PASS: ${{ secrets.FANTASY_SYNC_PASSPHRASE }}
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -e
          bad=0
          if [ -z "$PROJECT_ID" ]; then echo "::error::Secret VITE_FIREBASE_PROJECT_ID is missing or empty."; bad=1; fi
          if [ -z "$CRICKET" ]; then echo "::error::Secret CRICKETDATA_API_KEY is missing or empty."; bad=1; fi
          if [ -z "$PASS" ]; then echo "::error::Secret FANTASY_SYNC_PASSPHRASE is missing or empty."; bad=1; fi
          if [ -z "$SA_JSON" ]; then echo "::error::Secret FIREBASE_SERVICE_ACCOUNT_JSON is missing or empty."; bad=1; fi
          if [ "$bad" -ne 0 ]; then exit 1; fi
          first=$(printf '%s' "$SA_JSON" | head -c 1)
          if [ "$first" != "{" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON must be the full JSON file starting with {. Re-copy from Firebase → Service accounts → Generate new private key."
            exit 1
          fi

      - name: Install Cloud Function dependencies
        run: npm ci
        working-directory: functions

      - name: Write service account JSON to disk
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 << 'PY'
          import json, os
          path = os.path.join(os.environ["GITHUB_WORKSPACE"], "gcp-sa.json")
          with open(path, "w", encoding="utf-8") as f:
              json.dump(json.loads(os.environ["SA_JSON"]), f)
          PY
          test -f "$GCP_SA_KEY" && echo "Wrote $GCP_SA_KEY"

      - name: Install Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: "latest"
          project_id: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Push Cricket Data + sync passphrase to Secret Manager (gcloud)
        env:
          CRICKETDATA_API_KEY: ${{ secrets.CRICKETDATA_API_KEY }}
          FANTASY_SYNC_PASSPHRASE: ${{ secrets.FANTASY_SYNC_PASSPHRASE }}
        run: |
          set -e
          gcloud auth activate-service-account --key-file="$GCP_SA_KEY"
          gcloud config set project "$PROJECT_ID"

          upsert_secret() {
            local name="$1"
            local val="$2"
            if gcloud secrets describe "$name" --project="$PROJECT_ID" &>/dev/null; then
              printf '%s' "$val" | gcloud secrets versions add "$name" --data-file=- --project="$PROJECT_ID"
            else
              printf '%s' "$val" | gcloud secrets create "$name" --replication-policy=automatic --data-file=- --project="$PROJECT_ID"
            fi
          }

          upsert_secret CRICKETDATA_API_KEY "$CRICKETDATA_API_KEY"
          upsert_secret FANTASY_SYNC_PASSPHRASE "$FANTASY_SYNC_PASSPHRASE"
          echo "Secret Manager updated for CRICKETDATA_API_KEY and FANTASY_SYNC_PASSPHRASE."

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules and Cloud Functions
        run: firebase deploy --only firestore:rules,functions --project "$PROJECT_ID" --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcp-sa.json
          GOOGLE_CLOUD_PROJECT: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
