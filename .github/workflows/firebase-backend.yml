# Deploy Firestore rules + Cloud Functions from GitHub (no local machine required).
# Add repository secrets first — see docs/firebase-score-sync.md
name: Deploy Firebase backend

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Cloud Function dependencies
        run: npm ci
        working-directory: functions

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Push Cricket Data + sync passphrase into Firebase (Secret Manager)
        run: |
          printf '%s' "$CRICKETDATA_API_KEY" | firebase functions:secrets:set CRICKETDATA_API_KEY --project "$PROJECT_ID" --data-file=-
          printf '%s' "$FANTASY_SYNC_PASSPHRASE" | firebase functions:secrets:set FANTASY_SYNC_PASSPHRASE --project "$PROJECT_ID" --data-file=-
        env:
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          CRICKETDATA_API_KEY: ${{ secrets.CRICKETDATA_API_KEY }}
          FANTASY_SYNC_PASSPHRASE: ${{ secrets.FANTASY_SYNC_PASSPHRASE }}

      - name: Deploy Firestore rules and Cloud Functions
        run: firebase deploy --only firestore:rules,functions --project "$PROJECT_ID" --non-interactive
        env:
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
